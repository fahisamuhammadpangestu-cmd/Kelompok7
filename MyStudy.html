<!DOCTYPE html>
<html>
<head>
    <title>My Study</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, #1f3b4d, #2c5364);
            text-align: center;
        }

        h2 {
            color: #e0f7fa;
            margin-top: 30px;
            letter-spacing: 2px;
        }

        hr {
            width: 50%;
            border: 1px solid #b2ebf2;
            margin-bottom: 30px;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background-color: rgba(255,255,255,0.95);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        th {
            background-color: #203a43;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
        }

        tr:nth-child(even) {
            background-color: #f1f1f1;
        }

        tr:hover {
            background-color: #d4f1f9;
            transition: 0.3s;
        }
    </style>
</head>

<body>

<h2>Riwayat Pendidikan</h2>
<hr>

<table>
    <tr>
        <th>No</th>
        <th>Nama Sekolah</th>
        <th>Tahun</th>
    </tr>
    <tr>
        <td>1</td>
        <td>SD Negeri Cimuning 5</td>
        <td>2011 - 2017</td>
    </tr>
    <tr>
        <td>2</td>
        <td>SMP Negeri 10 Kota Bekasi</td>
        <td>2017 - 2020</td>
    </tr>
    <tr>
        <td>3</td>
        <td>SMK Negeri 15 Kota Bekasi</td>
        <td>2020 - 2023</td>
    </tr>
    <tr>
        <td>4</td>
        <td>Universitas Bhayangkara Jakarta Raya</td>
        <td>2023 - Sekarang</td>
    </tr>
</table>

</body>
</html>
